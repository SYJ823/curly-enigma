<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <script>
    setTimeout(function () {
      console.log('时间到了');
    }, 2000)
    //JavaScript 内置的一个用来让代码延迟执行的函数
    //setTimeout仅仅执行一次，所以可以理解为就是把一段代码延迟执行，平时省略window

    // 清除延时函数:
    // let timer=setTimeout (回调函数，等待的毫秒数)
    // clearTimeout (timer)
    // 注意点
    // 延时器需要等待，所以后面的代码先执行
    // 每一次调用延时器都会产生一个新的延时器
  </script>
</body>

</html>
